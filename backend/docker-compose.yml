version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: votingdb-postgres
    environment:
      POSTGRES_DB: votingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - voting-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-gui
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - voting-network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  voting-network:
    driver: bridge